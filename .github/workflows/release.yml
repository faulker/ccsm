name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Calculate next version
        id: bump
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump }}
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          VERSION="${LATEST_TAG#v}"
          # Strip any pre-release or build metadata (e.g. 1.2.3-alpha.1+build)
          VERSION="${VERSION%%-*}"
          VERSION="${VERSION%%+*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST_TAG -> $NEW_TAG ($BUMP_TYPE)"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.toml version and lockfile
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          VERSION="${NEW_TAG#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          cargo generate-lockfile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${VERSION}"
          git push origin HEAD:main

      - name: Create and push tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: [resolve-version]
    if: always() && (needs.resolve-version.result == 'success' || needs.resolve-version.result == 'skipped')
    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.new_tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - name: macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version in Cargo.toml (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Set version in Cargo.toml (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf "ccsm-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" ccsm
          mv "ccsm-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" "$GITHUB_WORKSPACE/"

      - name: Package binary (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/ccsm.exe" -DestinationPath "ccsm-$env:RELEASE_TAG-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccsm-${{ matrix.target }}
          path: ccsm-${{ env.RELEASE_TAG }}-${{ matrix.target }}.*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [resolve-version, build]
    if: always() && needs.build.result == 'success'
    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.new_tag || github.ref_name }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: artifacts/*
